<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>termin → three.js</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: monospace; }
  canvas { display: block; }
  #info {
    position: absolute; top: 10px; left: 10px;
    color: #aaa; font-size: 13px;
    background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 4px;
  }
</style>
</head>
<body>
<div id="info">termin scene &rarr; three.js | orbit: drag | zoom: scroll</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 15, 30);

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(4, 3, 5);
camera.lookAt(0, 0, 0);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// Lights
const ambient = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 8, 4);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.1;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -6;
dirLight.shadow.camera.right = 6;
dirLight.shadow.camera.top = 6;
dirLight.shadow.camera.bottom = -6;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x6688cc, 0.4);
fillLight.position.set(-3, 2, -4);
scene.add(fillLight);

// Grid
const grid = new THREE.GridHelper(10, 20, 0x333355, 0x222244);
grid.position.y = -0.5;
scene.add(grid);

// Load scene from server
async function loadScene() {
    const resp = await fetch('/api/scene');
    const objects = await resp.json();

    for (const obj of objects) {
        const mesh = obj.mesh;

        // Build BufferGeometry
        const geom = new THREE.BufferGeometry();
        const verts = new Float32Array(mesh.vertices);
        geom.setAttribute('position', new THREE.BufferAttribute(verts, 3));

        if (mesh.normals) {
            geom.setAttribute('normal', new THREE.BufferAttribute(new Float32Array(mesh.normals), 3));
        }

        if (mesh.indices) {
            geom.setIndex(new THREE.BufferAttribute(new Uint32Array(mesh.indices), 1));
        }

        if (!mesh.normals) {
            geom.computeVertexNormals();
        }

        // Material
        const color = new THREE.Color(obj.color[0], obj.color[1], obj.color[2]);
        const mat = new THREE.MeshStandardMaterial({
            color: color,
            roughness: 0.55,
            metalness: 0.1,
        });

        const threeMesh = new THREE.Mesh(geom, mat);
        threeMesh.name = obj.name;

        // Transform
        threeMesh.position.set(obj.position[0], obj.position[1], obj.position[2]);
        threeMesh.quaternion.set(obj.rotation[0], obj.rotation[1], obj.rotation[2], obj.rotation[3]);
        threeMesh.scale.set(obj.scale[0], obj.scale[1], obj.scale[2]);

        // Shadows
        threeMesh.castShadow = true;
        threeMesh.receiveShadow = true;

        scene.add(threeMesh);
    }
}

loadScene();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Render loop
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
